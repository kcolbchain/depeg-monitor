stablecoins:
  - symbol: USDC
    peg: 1.0
    warn_threshold: 0.005
    critical_threshold: 0.01
  - symbol: USDT
    peg: 1.0
    warn_threshold: 0.005
    critical_threshold: 0.01
  - symbol: DAI
    peg: 1.0
    warn_threshold: 0.005
    critical_threshold: 0.01

sources:
  cex:
    - binance
    - coinbase
  dex:
    rpc_url: "https://eth.llamarpc.com"

alerts:
  console: true
  discord_webhook: ""
  slack_webhook: ""
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"

interval_seconds: 30

health:
  port: 8080
